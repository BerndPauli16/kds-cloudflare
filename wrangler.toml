name = "kds-cloudflare"
main = "src/index.js"
account_id = "f1c8788eb10870b12ac498a71b81d1f3"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── Custom Domain ──────────────────────────────────────────
routes = [
  { pattern = "kds.team24.training", custom_domain = true },
  { pattern = "schankmonitor.team24.training", custom_domain = true }
]

# ─── D1 Datenbank ───────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "kds-db"
database_id = "b76c3d0e-43ec-42cb-9a63-bd3d68c92b15"

# ─── R2 Objekt-Speicher ─────────────────────────────────────
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "kds-storage"

# ─── Durable Objects (WebSocket-Echtzeit) ───────────────────
[durable_objects]
bindings = [
  { name = "KDS_ROOM", class_name = "KDSRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["KDSRoom"]
